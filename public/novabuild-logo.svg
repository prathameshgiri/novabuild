<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#042f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#ffffff" />
  
  <!-- The "N" architectural mark -->
  <g filter="url(#shadow)" transform="translate(100, 100)">
    <!-- Left Pillar -->
    <path d="M 40 312 L 40 40 C 40 18 58 0 80 0 L 100 0 C 122 0 140 18 140 40 L 140 312 Z" fill="url(#grad1)" />
    
    <!-- Right Pillar (Offset) -->
    <path d="M 172 312 L 172 40 C 172 18 190 0 212 0 L 232 0 C 254 0 272 18 272 40 L 272 312 Z" fill="url(#grad1)" />
    
    <!-- Cross Beam -->
    <path d="M 60 40 L 252 312" stroke="url(#grad2)" stroke-width="64" stroke-linecap="round" />
  </g>
</svg>
